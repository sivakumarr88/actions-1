name: Generate Ascii Artwork

on: push

jobs:
    cowsay-job-1:
        runs-on: ubuntu-latest
        steps:
            - name: Install Cowsay program
              run: sudo apt-get install cowsay -y

            - name: Execute cowsay command
              run: cowsay -f dragon "Run for cover, I am DRAGON....RAWR" >> dragon.txt

            - name: Upload the generated file as an artifact
              uses: actions/upload-artifact@v6
              with:
                name: dragon-artwork-file
                path: dragon.txt

    test-job-2:
        runs-on: ubuntu-latest
        needs: cowsay-job-1
        steps:
            - name: Download the generated file artifact
              uses: actions/download-artifact@v6
              with:
                name: dragon-artwork-file
            
            - name: Test file exists
              run: grep -i "dragon" dragon.txt

    display-job-3:
        runs-on: ubuntu-latest
        needs: test-job-2
        steps:
            - name: download generated file artwork
              uses: actions/download-artwork@v6
              with:
                name: dragon-artwork-file
        
            - name: Display the content of the file
              run: cat dragon.txt

